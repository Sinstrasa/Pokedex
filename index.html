<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/standard.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/dialog.css" />
    <link rel="stylesheet" href="styles/background.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/responsive.css" />
    <script src="scripts/template.js"></script>
    <script src="scripts/bgcolor.js"></script>
    <script src="scripts.js"></script>
    <link
      rel="shortcut icon"
      href="assets/icons/pokeball_png.png"
      type="image/x-icon"
    />
    <title>Pokédex</title>
  </head>
  <body onload="initialise()">
    <header>
      <section class="logo">
        <a href="https://www.youtube.com/watch?v=cvh0nX08nRw"
          ><img src="assets/icons/pokeball_png.png" alt="Logo of Pokédex"
        /></a>
        <h1>Pokédex</h1>
      </section>
      <section class="search_section">
        <button class="reset_button" id="resetButton" onclick="resetPage()">
          Reset
        </button>
        <input
          id="searchInput"
          data-id="search-input"
          type="search"
          placeholder="Search for Pokémon"
        />
        <button
          class="search_button"
          id="searchButton"
          data-id="search-button"
          onclick="validateSearch()"
        >
          Search
        </button>
      </section>
    </header>
    <main data-id="content">
      <dialog id="dialog" data-id="dialog" onclick="closeDialog()">
        <article
          class="dialog_design"
          id="dialogDesign"
          onclick="stopPropagation(event)"
        ></article>
      </dialog>
      <section class="overlay" id="overlay">
        <div class="gif">
          <img src="assets/icons/pokeball_gif.gif" alt="Pokéball Gif" />
        </div>
      </section>
      <section class="poké_cards" id="pokéCards"></section>
    </main>
    <footer>
      <section class="change_page">
        <button
          id="previous"
          data-id="load-more"
          onclick="(switchPage(false), getFocus('previous'))"
        >
          <p>Previous Page</p>
        </button>
        <p id="page">Page 1 / 52</p>
        <button
          id="next"
          data-id="load-more"
          onclick="(switchPage(true), getFocus('next'))"
        >
          <p>Next Page</p>
        </button>
      </section>
      <section class="da">
        <div>
          <img
            src="assets/icons/da_logo.svg"
            alt="Logo of Developer Akademie"
          />
          <img
            src="assets/icons/da_title.svg"
            alt="Title of Developer Akademie"
          />
        </div>
        <section class="copyright">
          <p>© 2023 Developer Akademie GmbH</p>
        </section>
      </section>
    </footer>
  </body>
</html>
